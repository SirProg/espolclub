<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="Kevin Maldonado Paredes">
  <meta name="description" content="ESPOLCLUB — Clubes y capítulos estudiantiles de ESPOL">
  <title>ESPOLCLUB — Iniciar sesión</title>

  <!-- Evita el parpadeo de tema (FOUC) aplicando el tema antes de pintar -->
  <script src="js/theme-init.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="css/themes.css" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col" data-root="">

  <!-- Botón de tema -->
  <div class="absolute top-4 right-4">
    <button id="theme-btn" class="btn btn-ghost px-2 py-1" title="Cambiar tema">
      <span data-theme-icon>🌙</span>
    </button>
  </div>

  <main class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-sm">

      <!-- Marca -->
      <div class="text-center mb-6">
        <span class="inline-flex items-center justify-center w-14 h-14 rounded-2xl btn-primary text-2xl font-black mb-3">E</span>
        <h1 class="text-2xl font-extrabold tracking-tight">ESPOL<span class="app-accent">CLUB</span></h1>
        <p class="app-muted text-sm mt-1">Clubes y capítulos estudiantiles de ESPOL</p>
      </div>

      <!-- Tarjeta de login -->
      <div class="card p-6">
        <h2 class="font-bold text-lg mb-1">Iniciar sesión</h2>
        <p class="app-muted text-sm mb-4">Accede con tu cuenta institucional.</p>

        <form id="login-form" class="flex flex-col gap-3" novalidate>
          <div>
            <label class="label" for="enrollment">Matrícula o correo</label>
            <input id="enrollment" class="input mt-1" type="text" placeholder="202311346" autocomplete="username">
          </div>
          <div>
            <div class="flex items-center justify-between">
              <label class="label" for="password">Contraseña</label>
              <a href="pages/auth/recuperacion.html" class="text-xs app-primary font-semibold">¿Olvidaste tu contraseña?</a>
            </div>
            <input id="password" class="input mt-1" type="password" placeholder="••••••••" autocomplete="current-password">
          </div>

          <p id="login-error" class="field-error hidden"></p>

          <button type="submit" class="btn btn-primary w-full mt-1">Ingresar</button>
        </form>

        <p class="text-center app-muted text-sm mt-4">
          ¿No tienes cuenta? <a href="pages/auth/registro.html" class="app-primary font-semibold">Crear cuenta</a>
        </p>

        <div class="divider my-4"></div>

        <!-- Acceso rápido a usuarios mock (Fase 1, RF-04) -->
        <p class="app-muted text-xs mb-2 font-semibold uppercase tracking-wide">Acceso rápido (demo)</p>
        <div class="grid grid-cols-2 gap-2">
          <button class="btn btn-ghost text-xs py-1.5" data-mock="estudiante">Estudiante</button>
          <button class="btn btn-ghost text-xs py-1.5" data-mock="miembro">Miembro</button>
          <button class="btn btn-ghost text-xs py-1.5" data-mock="lider">Líder</button>
          <button class="btn btn-ghost text-xs py-1.5" data-mock="gbp">GBP</button>
        </div>
      </div>

      <p class="text-center app-muted text-xs mt-4">
        Fase 1 — autenticación simulada con datos locales.
      </p>
    </div>
  </main>

  <script type="module" src="js/pages/auth/login.js"></script>
</body>
</html>

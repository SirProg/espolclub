<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESPOLCLUB — Recuperar contraseña</title>
  <script src="../../js/theme-init.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="../../css/themes.css" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col" data-root="../../">

  <div class="absolute top-4 right-4">
    <button id="theme-btn" class="btn btn-ghost px-2 py-1" title="Cambiar tema"><span data-theme-icon>🌙</span></button>
  </div>

  <main class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
      <div class="text-center mb-6">
        <span class="inline-flex items-center justify-center w-14 h-14 rounded-2xl btn-primary text-2xl font-black mb-3">E</span>
        <h1 class="text-2xl font-extrabold tracking-tight">Recuperar contraseña</h1>
        <p class="app-muted text-sm mt-1">Te enviaremos instrucciones a tu correo institucional.</p>
      </div>

      <div class="card p-6">
        <form id="rec-form" class="flex flex-col gap-3" novalidate>
          <div>
            <label class="label" for="email">Correo institucional</label>
            <input id="email" class="input mt-1" type="email" placeholder="usuario@espol.edu.ec">
            <p class="field-error hidden"></p>
          </div>
          <button type="submit" class="btn btn-primary w-full mt-1">Enviar instrucciones</button>
          <div id="done" class="hidden badge badge-success mt-1 w-full justify-center py-2"></div>
        </form>
      </div>

      <p class="text-center app-muted text-sm mt-4">
        <a href="../../index.html" class="app-primary font-semibold">Volver al inicio de sesión</a>
      </p>
    </div>
  </main>

  <script type="module" src="../../js/app.js"></script>
  <script type="module" src="../../js/pages/auth/recuperacion.js"></script>
</body>
</html>

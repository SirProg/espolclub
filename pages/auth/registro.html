<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESPOLCLUB — Registro de cuenta</title>
  <script src="../../js/theme-init.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="../../css/themes.css" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col" data-root="../../">

  <div class="absolute top-4 right-4">
    <button id="theme-btn" class="btn btn-ghost px-2 py-1" title="Cambiar tema"><span data-theme-icon>🌙</span></button>
  </div>

  <main class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-lg">
      <div class="text-center mb-6">
        <span class="inline-flex items-center justify-center w-14 h-14 rounded-2xl btn-primary text-2xl font-black mb-3">E</span>
        <h1 class="text-2xl font-extrabold tracking-tight">Crear cuenta</h1>
        <p class="app-muted text-sm mt-1">Regístrate con tu correo institucional de ESPOL.</p>
      </div>

      <div class="card p-6">
        <form id="reg-form" class="flex flex-col gap-3" novalidate>
          <div class="grid sm:grid-cols-2 gap-3">
            <div>
              <label class="label" for="enrollment">Matrícula</label>
              <input id="enrollment" class="input mt-1" type="text" placeholder="202311346">
              <p class="field-error hidden"></p>
            </div>
            <div>
              <label class="label" for="email">Correo institucional</label>
              <input id="email" class="input mt-1" type="email" placeholder="usuario@espol.edu.ec">
              <p class="field-error hidden"></p>
            </div>
          </div>

          <div class="grid sm:grid-cols-2 gap-3">
            <div>
              <label class="label" for="first_name">Nombres</label>
              <input id="first_name" class="input mt-1" type="text">
              <p class="field-error hidden"></p>
            </div>
            <div>
              <label class="label" for="last_name">Apellidos</label>
              <input id="last_name" class="input mt-1" type="text">
              <p class="field-error hidden"></p>
            </div>
          </div>

          <div class="grid sm:grid-cols-3 gap-3">
            <div>
              <label class="label" for="birth_date">Fecha de nacimiento</label>
              <input id="birth_date" class="input mt-1" type="date">
              <p class="field-error hidden"></p>
            </div>
            <div>
              <label class="label" for="faculty">Facultad</label>
              <select id="faculty" class="select mt-1"><option value="">Selecciona…</option></select>
              <p class="field-error hidden"></p>
            </div>
            <div>
              <label class="label" for="semester">Semestre</label>
              <input id="semester" class="input mt-1" type="number" min="1" max="12">
              <p class="field-error hidden"></p>
            </div>
          </div>

          <div>
            <label class="label" for="career">Carrera</label>
            <input id="career" class="input mt-1" type="text" placeholder="Computación">
            <p class="field-error hidden"></p>
          </div>

          <div class="grid sm:grid-cols-2 gap-3">
            <div>
              <label class="label" for="password">Contraseña</label>
              <input id="password" class="input mt-1" type="password" autocomplete="new-password">
              <p class="field-error hidden"></p>
            </div>
            <div>
              <label class="label" for="password2">Confirmar contraseña</label>
              <input id="password2" class="input mt-1" type="password" autocomplete="new-password">
              <p class="field-error hidden"></p>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-full mt-2">Crear cuenta</button>
        </form>
      </div>

      <p class="text-center app-muted text-sm mt-4">
        ¿Ya tienes cuenta? <a href="../../index.html" class="app-primary font-semibold">Inicia sesión</a>
      </p>
    </div>
  </main>

  <script type="module" src="../../js/app.js"></script>
  <script type="module" src="../../js/pages/auth/registro.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESPOLCLUB — Credencial QR</title>
  <script src="../../js/theme-init.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Librería cliente para generar el QR simulado (Fase 1) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <link href="../../css/themes.css" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col"
      data-root="../../" data-env="movil" data-active="credencial"
      data-protected data-roles="Estudiante Politécnico,Miembro del Club,Líder de Club">

  <header id="app-header"></header>

  <main class="flex-1 max-w-2xl w-full mx-auto px-4 py-6">
    <h1 class="text-2xl font-extrabold tracking-tight mb-1">Mis credenciales</h1>
    <p class="app-muted text-sm mb-5">Presenta tu QR al staff para registrar tu asistencia.</p>

    <div id="list" class="flex flex-col gap-4"></div>
    <div id="empty" class="hidden text-center py-16 app-muted">
      <p class="text-4xl mb-2">🎫</p>
      <p>Aún no tienes credenciales. Inscríbete a un evento para generar tu QR.</p>
    </div>
  </main>

  <script type="module" src="../../js/pages/movil/credencial-qr.js"></script>
  <script type="module" src="../../js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESPOLCLUB — Catálogo de clubes</title>
  <script src="../../js/theme-init.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="../../css/themes.css" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col"
      data-root="../../" data-env="movil" data-active="catalogo"
      data-protected data-roles="Estudiante Politécnico,Miembro del Club,Líder de Club">

  <header id="app-header"></header>

  <main class="flex-1 max-w-6xl w-full mx-auto px-4 py-6">
    <div class="mb-5">
      <h1 class="text-2xl font-extrabold tracking-tight">Descubre clubes</h1>
      <p class="app-muted text-sm">Explora las comunidades y capítulos estudiantiles de ESPOL.</p>
    </div>

    <!-- F-04: filtros del catálogo -->
    <div class="card p-4 mb-6 grid gap-3 sm:grid-cols-3">
      <div class="sm:col-span-1">
        <label class="label" for="q">Buscar</label>
        <input id="q" class="input mt-1" type="search" placeholder="Nombre o acrónimo…">
      </div>
      <div>
        <label class="label" for="faculty">Facultad</label>
        <select id="faculty" class="select mt-1"><option value="">Todas</option></select>
      </div>
      <div>
        <label class="label" for="area">Área de interés</label>
        <select id="area" class="select mt-1"><option value="">Todas</option></select>
      </div>
    </div>

    <p id="result-count" class="app-muted text-sm mb-3"></p>

    <div id="grid" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>

    <div id="empty" class="hidden text-center py-16 app-muted">
      <p class="text-4xl mb-2">🔍</p>
      <p>No se encontraron clubes con esos filtros.</p>
    </div>
  </main>

  <script type="module" src="../../js/app.js"></script>
  <script type="module" src="../../js/pages/movil/catalogo.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESPOLCLUB — Detalle de club</title>
  <script src="../../js/theme-init.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="../../css/themes.css" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col"
      data-root="../../" data-env="movil" data-active="catalogo"
      data-protected data-roles="Estudiante Politécnico,Miembro del Club,Líder de Club">

  <header id="app-header"></header>

  <main class="flex-1 max-w-4xl w-full mx-auto px-4 py-6">
    <a href="catalogo.html" class="text-sm app-muted hover:app-text">&larr; Volver al catálogo</a>
    <div id="club-view" class="mt-3"></div>
  </main>

  <!-- Modal de postulación (F-05) -->
  <div id="apply-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4"
       style="background: rgba(0,0,0,.5)">
    <div class="card w-full max-w-md max-h-[90vh] overflow-y-auto p-6">
      <div class="flex items-center justify-between mb-1">
        <h3 class="font-bold text-lg" id="apply-title">Postular al club</h3>
        <button id="apply-close" class="btn btn-ghost px-2 py-1">✕</button>
      </div>
      <p class="app-muted text-sm mb-4">Responde el formulario del líder para enviar tu solicitud.</p>
      <form id="apply-form" class="flex flex-col gap-4" novalidate>
        <div id="apply-fields" class="flex flex-col gap-4"></div>
        <button type="submit" class="btn btn-primary w-full">Enviar solicitud</button>
      </form>
    </div>
  </div>

  <script type="module" src="../../js/app.js"></script>
  <script type="module" src="../../js/pages/movil/club-detalle.js"></script>
</body>
</html>

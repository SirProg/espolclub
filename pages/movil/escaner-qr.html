<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESPOLCLUB — Escáner QR</title>
  <script src="../../js/theme-init.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="../../css/themes.css" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col"
      data-root="../../" data-env="movil" data-active="escaner"
      data-protected data-roles="Miembro del Club,Líder de Club">

  <header id="app-header"></header>

  <main class="flex-1 max-w-md w-full mx-auto px-4 py-6">
    <h1 class="text-2xl font-extrabold tracking-tight mb-1">Escáner QR</h1>
    <p class="app-muted text-sm mb-5">Valida la credencial del asistente para registrar su entrada.</p>

    <div class="card p-6">
      <div class="aspect-square app-surface-2 rounded-xl flex items-center justify-center mb-4 border-2 border-dashed app-border">
        <p class="app-muted text-sm text-center px-6">📷 Apunta la cámara al QR<br>
          <span class="text-xs">(simulado en Fase 1)</span></p>
      </div>

      <label class="label" for="token">Código de la credencial</label>
      <input id="token" class="input mt-1" type="text" placeholder="MOCKQR-…">

      <p class="app-muted text-xs mt-2 mb-1">Demo: selecciona un código existente</p>
      <select id="token-demo" class="select"><option value="">—</option></select>

      <button id="scan-btn" class="btn btn-primary w-full mt-4">Validar asistencia</button>

      <div id="result" class="hidden mt-4 p-4 rounded-xl text-center"></div>
    </div>
  </main>

  <script type="module" src="../../js/app.js"></script>
  <script type="module" src="../../js/pages/movil/escaner-qr.js"></script>
</body>
</html>

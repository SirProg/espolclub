<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESPOLCLUB — Perfil e historial</title>
  <script src="../../js/theme-init.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="../../css/themes.css" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col"
      data-root="../../" data-env="movil" data-active="perfil"
      data-protected data-roles="Estudiante Politécnico,Miembro del Club,Líder de Club">

  <header id="app-header"></header>

  <main class="flex-1 max-w-3xl w-full mx-auto px-4 py-6">
    <h1 class="text-2xl font-extrabold tracking-tight mb-1">Mi perfil</h1>
    <p class="app-muted text-sm mb-5">Consulta tus datos y gestiona tu información pública.</p>

    <!-- Datos institucionales (solo lectura) -->
    <section class="card p-6 mb-4">
      <h2 class="font-bold mb-4">Datos institucionales</h2>
      <div id="profile-readonly" class="grid sm:grid-cols-2 gap-4 text-sm"></div>
    </section>

    <!-- Datos editables (F-07) -->
    <section class="card p-6 mb-4">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold">Información pública</h2>
        <button id="edit-btn" class="btn btn-ghost text-sm py-1.5">Editar</button>
      </div>
      <div id="profile-view"></div>
      <form id="profile-form" class="hidden flex-col gap-4"></form>
    </section>

    <!-- Historial (pantalla 15) -->
    <section class="card p-6">
      <h2 class="font-bold mb-4">Historial</h2>
      <h3 class="text-sm font-semibold app-muted uppercase tracking-wide mb-2">Postulaciones</h3>
      <div id="hist-applications" class="mb-6">Cargando…</div>
      <h3 class="text-sm font-semibold app-muted uppercase tracking-wide mb-2">Inscripciones a eventos</h3>
      <div id="hist-attendances">Cargando…</div>
    </section>
  </main>

  <script type="module" src="../../js/app.js"></script>
  <script type="module" src="../../js/pages/movil/perfil.js"></script>
</body>
</html>
